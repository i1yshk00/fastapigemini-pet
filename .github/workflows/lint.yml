name: Lint

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry==1.8.4

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Install lint tools
        run: poetry run python -m pip install ruff black mypy

      - name: Ruff (syntax/runtime-critical rules)
        run: poetry run ruff check app tests --select E9,F63,F7,F82 --output-format=github

      - name: Black format check (non-blocking baseline)
        continue-on-error: true
        run: poetry run black --check app tests

      - name: Mypy type check (non-blocking baseline)
        continue-on-error: true
        run: poetry run mypy app --ignore-missing-imports

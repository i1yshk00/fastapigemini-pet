name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.4

      - name: Sync lock file for CI
        run: poetry lock --no-update

      - name: Install dependencies
        run: poetry install --no-root --no-interaction --no-ansi

      - name: Install ruff
        run: poetry run python -m pip install ruff

      - name: Run linter
        run: poetry run ruff check app tests --select E9,F63,F7,F82 --output-format=github

  tests:
    name: Tests (Python 3.12)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.4

      - name: Sync lock file for CI
        run: poetry lock --no-update

      - name: Install dependencies
        run: poetry install --no-root --no-interaction --no-ansi

      - name: Run tests
        env:
          JWT_SECRET_KEY: test-secret
          GEMINI_API_KEY: test-key
        run: poetry run pytest -v

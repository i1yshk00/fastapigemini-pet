name: Migrations

on:
  push:
    branches:
      - main
    paths:
      - alembic/**
      - app/models/**
      - app/db/**
      - app/core/config.py
      - alembic.ini
      - pyproject.toml
      - poetry.lock
  pull_request:
    paths:
      - alembic/**
      - app/models/**
      - app/db/**
      - app/core/config.py
      - alembic.ini
      - pyproject.toml
      - poetry.lock

jobs:
  alembic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fastapi_gemini_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fastapi_gemini_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/fastapi_gemini_ci
      JWT_SECRET_KEY: ci-secret
      GEMINI_API_KEY: ci-key
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry==1.8.4

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Upgrade to head
        run: poetry run alembic upgrade head

      - name: Downgrade to base
        run: poetry run alembic downgrade base

      - name: Upgrade to head again
        run: poetry run alembic upgrade head

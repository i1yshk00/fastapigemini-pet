name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: read

jobs:
  deploy-staging:
    name: Deploy to staging
    if: >-
      (github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')) &&
      secrets.STAGING_HOST != '' &&
      secrets.STAGING_USER != '' &&
      secrets.STAGING_SSH_KEY != '' &&
      secrets.STAGING_APP_DIR != ''
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.STAGING_APP_DIR }}"
            git fetch --all
            git checkout main
            git pull --ff-only origin main
            docker compose pull
            docker compose run --rm app alembic upgrade head
            docker compose up -d --build
            docker image prune -f

  deploy-production:
    name: Deploy to production
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production' &&
      secrets.PRODUCTION_HOST != '' &&
      secrets.PRODUCTION_USER != '' &&
      secrets.PRODUCTION_SSH_KEY != '' &&
      secrets.PRODUCTION_APP_DIR != ''
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.PRODUCTION_APP_DIR }}"
            git fetch --all
            git checkout main
            git pull --ff-only origin main
            docker compose pull
            docker compose run --rm app alembic upgrade head
            docker compose up -d --build
            docker image prune -f
